<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request E-Pass - Global Events</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/toast.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        .container-form {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin: 0 0 10px 0;
        }

        .header p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-submit.loading {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .container-form {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container-form">
        <div class="header">
            <h1>🎫 Request E-Pass</h1>
            <p>Get your event e-pass sent to your email</p>
        </div>

        <div id="messageBox" class="message"></div>

        <form id="requestEPassForm">
            <div class="form-group">
                <label for="eventSelect">Select Event *</label>
                <select id="eventSelect" name="eventId" required>
                    <option value="">-- Choose an event --</option>
                </select>
                <div class="form-hint">Select the event you registered for</div>
            </div>

            <div class="form-group">
                <label for="participantName">Your Name *</label>
                <input type="text" id="participantName" name="participantName" placeholder="Enter your full name" required>
                <div class="form-hint">Your registered name</div>
            </div>

            <div class="form-group">
                <label for="participantId">Participant ID *</label>
                <input type="text" id="participantId" name="participantId" placeholder="Enter your participant ID" required>
                <div class="form-hint">You can find this in your registration confirmation</div>
            </div>

            <div class="form-group">
                <label for="emailAddress">Email Address *</label>
                <input type="email" id="emailAddress" name="recipientEmail" placeholder="example@gmail.com" required>
                <div class="form-hint">The e-pass will be sent to this email</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span id="btnText">Send E-Pass to Email</span>
            </button>
        </form>

        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script src="js/toast.js"></script>
    <script>
        const API_BASE = 'http://localhost:3000/api';

        // Load available events on page load
        async function loadEvents() {
            try {
                const response = await fetch(`${API_BASE}/events`);
                if (!response.ok) throw new Error('Failed to load events');

                const events = await response.json();
                const eventSelect = document.getElementById('eventSelect');

                events.forEach(event => {
                    const option = document.createElement('option');
                    option.value = event._id;
                    option.textContent = `${event.title} - ${new Date(event.date).toLocaleDateString()}`;
                    eventSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading events:', error);
                showMessage('Error loading events. Please refresh the page.', 'error');
            }
        }

        // Handle form submission
        document.getElementById('requestEPassForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const eventId = document.getElementById('eventSelect').value;
            const participantId = document.getElementById('participantId').value;
            const recipientEmail = document.getElementById('emailAddress').value;

            if (!eventId || !participantId || !recipientEmail) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(recipientEmail)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            await sendEPassRequest(participantId, eventId, recipientEmail);
        });

        // Send E-Pass request
        async function sendEPassRequest(participantId, eventId, recipientEmail) {
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');

            try {
                // Disable button and show loading state
                submitBtn.disabled = true;
                submitBtn.classList.add('loading');
                btnText.innerHTML = 'Sending...';

                const response = await fetch(`${API_BASE}/epasses/request-email`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        participantId,
                        eventId,
                        recipientEmail
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(
                        `✓ Success! E-Pass sent to ${recipientEmail}. Check your inbox and spam folder.`,
                        'success'
                    );
                    document.getElementById('requestEPassForm').reset();
                    document.getElementById('eventSelect').value = '';
                } else {
                    showMessage(
                        `Error: ${data.error || 'Failed to send E-Pass. Please try again.'}`,
                        'error'
                    );
                }
            } catch (error) {
                console.error('Error sending E-Pass:', error);
                showMessage(
                    'Error sending E-Pass. Please check your connection and try again.',
                    'error'
                );
            } finally {
                // Re-enable button and restore text
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                btnText.innerHTML = 'Send E-Pass to Email';
            }
        }

        // Show message function
        function showMessage(message, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = message;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'block';

            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 5000);
            }
        }

        // Load events on page load
        loadEvents();
    </script>
</body>
</html>
